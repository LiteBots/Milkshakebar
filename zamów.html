<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MilkMi - Zamówienia</title>
    
  <meta name="theme-color" content="#FF6600">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      /* Palette - Premium Flat */
      --primary: #FF6600;
      --bg-body: #F2F4F6;
      --bg-surface: #FFFFFF;
      --text-main: #111827;
      --text-sub: #6B7280;
      --border: #E5E7EB;
        
      --radius-l: 24px;
      --radius-m: 16px;
      --safe-top: env(safe-area-inset-top, 20px);
    }

    body.dark-mode {
      --bg-body: #0F0F0F;
      --bg-surface: #1C1C1E;
      --text-main: #FFFFFF;
      --text-sub: #9CA3AF;
      --border: #2D2D30;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-body);
      overflow-x: hidden;
      overscroll-behavior-y: none;
      transition: background 0.3s, color 0.3s;
      padding-top: var(--safe-top);
    }

    /* --- LAYOUT APLIKACJI --- */
    .app-container {
      max-width: 480px; 
      margin: 0 auto; 
      min-height: 100vh;
      background: var(--bg-body);
      box-shadow: 0 0 40px rgba(0,0,0,0.05);
      position: relative;
    }

    /* --- HEADER --- */
    .app-header { 
      padding: 15px 24px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 90; 
      background: rgba(242, 244, 246, 0.9); 
      backdrop-filter: blur(10px);
      transition: background 0.3s; 
    }
    body.dark-mode .app-header { background: rgba(15, 15, 15, 0.9); }
    
    .brand { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    .brand span { color: var(--primary); }

    .header-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn { 
      width: 40px; height: 40px; border-radius: 50%; background: var(--bg-surface); 
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; 
      color: var(--text-main); font-size: 1rem; cursor: pointer; position: relative; transition: 0.2s; 
    }
    .icon-btn:active { transform: scale(0.9); }
    .badge { 
      position: absolute; top: -2px; right: -2px; background: var(--primary); color: white; 
      font-size: 0.65rem; padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg-surface); 
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: none;
    }

    /* --- WIDOKI --- */
    .view-section { display: none; padding-bottom: 40px; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    .section-title { font-size: 1.2rem; font-weight: 800; margin: 20px 24px 15px; }

    /* Kategorie (POTĘŻNE KARTY - ok 1/3 ekranu) */
    .categories-list { display: flex; flex-direction: column; gap: 20px; padding: 0 24px; }
    .category-card {
      position: relative; 
      height: 30vh; /* Zajmuje 30% wysokości ekranu */
      min-height: 240px; /* Zabezpieczenie dla bardzo małych ekranów */
      border-radius: var(--radius-l);
      overflow: hidden; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      background-color: var(--bg-surface); transform: scale(1); transition: transform 0.2s;
    }
    .category-card:active { transform: scale(0.96); }
    .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .category-card:active img { transform: scale(1.05); }
    .category-overlay {
      position: absolute; inset: 0; padding: 25px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0) 100%);
      display: flex; align-items: flex-end;
    }
    .category-title { color: #fff; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 4px 10px rgba(0,0,0,0.7); line-height: 1; }

    /* Nagłówek powrotu wewnątrz menu */
    .menu-header { display: flex; align-items: center; gap: 15px; padding: 15px 24px 25px; }
    .back-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--bg-surface);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      color: var(--text-main); cursor: pointer; font-size: 1.1rem; transition: 0.2s;
    }
    .back-btn:active { transform: scale(0.9); background: var(--border); }

    /* Siatka produktów (2 na rząd) */
    .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 24px; }
    .item-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-m); overflow: hidden; display: flex; flex-direction: column;
      position: relative; transition: transform 0.2s;
    }
    .item-card:active { transform: scale(0.98); border-color: var(--primary); }
    .item-img-wrapper { height: 130px; width: 100%; overflow: hidden; background: #eee; }
    .item-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    
    .item-content { padding: 12px; display: flex; flex-direction: column; flex: 1; }
    .item-name { font-weight: 800; font-size: 0.85rem; line-height: 1.2; margin-bottom: 5px; color: var(--text-main); }
    .item-desc { font-size: 0.7rem; color: var(--text-sub); line-height: 1.3; margin-bottom: 12px; flex: 1; }
    
    .item-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
    .item-price { font-weight: 800; color: var(--primary); font-size: 0.95rem; }
    .item-add {
      background: var(--primary); color: white; width: 32px; height: 32px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
    }
    .item-add:active { transform: scale(0.85); }

    /* Toast Powiadomienia */
    .toast { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); 
      background: var(--bg-surface); color: var(--text-main); padding: 12px 20px; 
      border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; 
      align-items: center; gap: 10px; z-index: 3000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      font-weight: 600; font-size: 0.9rem; border: 1px solid var(--border); 
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* Animacje */
    @keyframes popIn { from{transform:scale(0);} to{transform:scale(1);} }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  </style>
</head>
<body>

<div class="app-container">

  <!-- Pasek górny -->
  <header class="app-header">
    <div class="brand">MilkMi<span>.</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" onclick="showCart()">
        <i class="fas fa-shopping-bag"></i>
        <div class="badge" id="cart-badge">0</div>
      </button>
    </div>
  </header>

  <!-- Widok 1: Główne Kategorie -->
  <section id="view-categories" class="view-section active">
      <div class="section-title">Co zamawiamy?</div>
      <div class="categories-list" id="categories-container">
          <!-- JS wygeneruje karty kategorii -->
      </div>
  </section>

  <!-- Widok 2: Lista produktów z danej kategorii -->
  <section id="view-items" class="view-section">
      <div class="menu-header">
          <button class="back-btn" onclick="goBackToCategories()"><i class="fas fa-arrow-left"></i></button>
          <h2 id="current-category-title" style="font-size: 1.6rem; font-weight: 800;">Kategoria</h2>
      </div>
      <div class="items-grid" id="items-container">
          <!-- JS wygeneruje siatkę produktów -->
      </div>
  </section>

</div>

<div id="toast" class="toast">
  <i class="fas fa-check-circle" style="color: var(--primary);"></i>
  <span id="toast-msg">Sukces</span>
</div>

<script>
// ==========================================
// BAZA DANYCH MENU (Zdjęcia z Unsplash)
// ==========================================
const menuData = {
    categories: [
        { id: 'shakes', name: 'Shakes', image: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=600&q=80' },
        { id: 'desery', name: 'Desery', image: 'https://i.imgur.com/vnEfVa4.jpeg' },
        { id: 'burgery', name: 'Burgery', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80' },
        { id: 'lunch', name: 'Lunch', image: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80' },
        { id: 'sniadania', name: 'Śniadania', image: 'https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?auto=format&fit=crop&w=600&q=80' },
        { id: 'mexico', name: 'Mexico', image: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?auto=format&fit=crop&w=600&q=80' },
        { id: 'napoje', name: 'Kawa i napoje', image: 'https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=600&q=80' }
    ],
    items: {
        'shakes': [
            { name: 'Oreo Monster', desc: 'Szejk waniliowy z kruszonymi ciastkami Oreo i bita śmietaną', price: '18.90', img: 'https://images.unsplash.com/photo-1579954115545-a95591f28bfc?auto=format&fit=crop&w=400&q=80' },
            { name: 'Truskawkowa Chmura', desc: 'Klasyczny szejk truskawkowy z owocami leśnymi', price: '16.90', img: 'https://images.unsplash.com/photo-1553177595-4de6bb080e5b?auto=format&fit=crop&w=400&q=80' },
            { name: 'Słony Karmel', desc: 'Karmel, sól morska, precle i gruba warstwa śmietany', price: '19.90', img: 'https://images.unsplash.com/photo-1577805947697-89e18249d767?auto=format&fit=crop&w=400&q=80' }
        ],
        'burgery': [
            { name: 'Classic Smash', desc: 'Podwójna wołowina smash, cheddar, pikle, sos autorski', price: '32.00', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=400&q=80' },
            { name: 'Bacon BBQ', desc: 'Wołowina, chrupiący bekon, krążki cebulowe, sos BBQ', price: '36.00', img: 'https://images.unsplash.com/photo-1594212691516-7360252b5757?auto=format&fit=crop&w=400&q=80' },
            { name: 'Vege Halloumi', desc: 'Ser halloumi, grillowane warzywa, rukola, konfitura z cebuli', price: '34.00', img: 'https://images.unsplash.com/photo-1520072959219-c595dc870360?auto=format&fit=crop&w=400&q=80' },
            { name: 'Spicy Jalapeno', desc: 'Wołowina, ser nachos, papryczki jalapeno, sriracha', price: '35.00', img: 'https://images.unsplash.com/photo-1586190848861-99aa4a171e90?auto=format&fit=crop&w=400&q=80' }
        ],
        'mexico': [
            { name: 'Quesadilla Kurczak', desc: 'Tortilla, kurczak, ciągnący się ser, pico de gallo, kwaśna śmietana', price: '28.00', img: 'https://images.unsplash.com/photo-1615870216519-2f9fa575fa5c?auto=format&fit=crop&w=400&q=80' },
            { name: 'Tacos Beef', desc: '3x tacos z szarpaną wołowiną, kolendrą i czerwoną cebulą', price: '31.00', img: 'https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?auto=format&fit=crop&w=400&q=80' }
        ]
    }
};

// ==========================================
// RENDEROWANIE INTERFEJSU
// ==========================================

function renderCategories() {
    const container = document.getElementById('categories-container');
    container.innerHTML = '';
    
    menuData.categories.forEach(cat => {
        container.innerHTML += `
            <div class="category-card" onclick="openCategory('${cat.id}', '${cat.name}')">
                <img src="${cat.image}" alt="${cat.name}">
                <div class="category-overlay">
                    <div class="category-title">${cat.name}</div>
                </div>
            </div>
        `;
    });
}

function openCategory(categoryId, categoryName) {
    document.getElementById('view-categories').classList.remove('active');
    document.getElementById('view-items').classList.add('active');
    document.getElementById('current-category-title').innerText = categoryName;
    
    const container = document.getElementById('items-container');
    container.innerHTML = '';
    
    const items = menuData.items[categoryId] || [];
    
    if (items.length === 0) {
        container.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 40px 0; color: var(--text-sub);">Pozycje wkrótce się pojawią.</div>';
        window.scrollTo({ top: 0 });
        return;
    }
    
    items.forEach(item => {
        container.innerHTML += `
            <div class="item-card">
                <div class="item-img-wrapper">
                    <img src="${item.img}" alt="${item.name}">
                </div>
                <div class="item-content">
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                    <div class="item-bottom">
                        <div class="item-price">${item.price} zł</div>
                        <button class="item-add" onclick="addToCart(event, '${item.name}')">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBackToCategories() {
    document.getElementById('view-items').classList.remove('active');
    document.getElementById('view-categories').classList.add('active');
}

// ==========================================
// KOSZYK I UŻYTECZNOŚCI
// ==========================================

let cartCount = 0;

function addToCart(event, itemName) {
    event.stopPropagation(); // Blokuje kliknięcie na kartę pod przyciskiem
    cartCount++;
    
    const badge = document.getElementById('cart-badge');
    badge.innerText = cartCount;
    badge.style.display = 'block';
    
    showToast(`Dodano do koszyka: ${itemName}`);
}

function showCart() {
    if (cartCount === 0) {
        showToast('Twój koszyk jest pusty!');
    } else {
        showToast(`W koszyku masz ${cartCount} produktów. Kasa w budowie!`);
    }
}

function toggleTheme() { 
    document.body.classList.toggle('dark-mode'); 
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2500);
}

// Inicjalizacja przy załadowaniu strony
document.addEventListener('DOMContentLoaded', () => {
    renderCategories();
});

</script>
</body>
</html>
