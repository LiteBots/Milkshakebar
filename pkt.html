<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>MilkShake Bar — Dodaj Punkty</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --primary: #FF6A00;
      --secondary: #FF9100;
      --accent: #FFE0B2;
      --bg: #FFF6EC;
      --text: #2B1300;
      --muted: rgba(43,19,0,0.65);
      --card: rgba(255,255,255,0.82);
      --card2: rgba(255,255,255,0.92);
      --border: rgba(43,19,0,0.12);
      --shadow: 0px 10px 30px rgba(0,0,0,0.12);
      --radius: 20px;
      --good: #16A34A;
      --bad: #DC2626;
      --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      font-family: Poppins, system-ui, Segoe UI, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(255,106,0,0.20), transparent 60%),
        radial-gradient(900px 500px at 90% 25%, rgba(255,145,0,0.16), transparent 60%),
        radial-gradient(800px 500px at 50% 90%, rgba(43,19,0,0.06), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    /* Karta główna */
    .card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(12px);
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      font-weight: 900;
      letter-spacing: .2px;
      text-align: center;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card p.desc {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    /* Pola formularza */
    .field { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .field label { font-weight: 900; font-size: .9rem; }
    
    .input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 2px solid rgba(43,19,0,0.10);
      background: rgba(255,255,255,0.90);
      color: var(--text);
      outline: none;
      font-family: Poppins;
      font-size: 1rem;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .input:focus {
      border-color: rgba(255,106,0,0.55);
      box-shadow: 0 10px 26px rgba(255,106,0,0.12);
    }

    /* Podgląd punktów */
    .points-preview {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,106,0,0.08);
      border: 1px solid rgba(255,106,0,0.2);
      text-align: center;
      font-weight: 900;
      font-size: 1.1rem;
    }
    .points-preview span {
      color: var(--primary);
      font-size: 1.5rem;
    }

    /* Przyciski */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      border: none;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      padding: 14px;
      border-radius: 999px;
      color: var(--text);
      background: rgba(255,255,255,0.80);
      border: 1px solid var(--border);
      transition: .18s ease;
      display: inline-flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      box-shadow: 0 12px 26px rgba(0,0,0,0.08);
      font-family: Poppins;
      text-decoration: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.95);
    }
    .btn.primary {
      color: #fff;
      background: var(--gradient);
      border-color: rgba(255,145,0,0.45);
      box-shadow: 0 14px 35px rgba(255,106,0,0.22);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 18px; right: 18px; z-index: 12000;
      display: none; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 999px;
      background: rgba(22,163,74,0.14);
      border: 1px solid rgba(22,163,74,0.25);
      color: var(--text);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.18);
      font-weight: 900;
    }
    #toast i { color: var(--good); }
  </style>
</head>
<body>

  <div class="card">
    <h2>Dodaj punkty</h2>
    <p class="desc">System automatycznie przelicza 10 zł = 1 pkt.</p>

    <form id="pointsForm">
      <div class="field">
        <label>Adres e-mail użytkownika</label>
        <input type="email" class="input" id="userEmail" placeholder="np. jan@kowalski.pl" required>
      </div>
      
      <div class="field">
        <label>Wydana kwota (PLN)</label>
        <input type="number" class="input" id="amount" step="0.01" min="0" placeholder="0.00" required>
      </div>

      <div class="points-preview">
        Do przyznania: <br>
        <span id="calculatedPoints">0</span> pkt
      </div>

      <div class="button-group">
        <button type="submit" class="btn primary" id="submitBtn">
          <i class="fa-brands fa-discord"></i> Dodaj
        </button>
        <a href="admin.html" class="btn">
          <i class="fa-solid fa-arrow-left"></i> Powrót do panelu
        </a>
      </div>
    </form>
  </div>

  <div id="toast">
    <i class="fa-solid fa-circle-check" id="toastIcon"></i>
    <span id="toastText"></span>
  </div>

  <script>
    const amountInput = document.getElementById('amount');
    const calculatedPointsDisplay = document.getElementById('calculatedPoints');
    const form = document.getElementById('pointsForm');
    const submitBtn = document.getElementById('submitBtn');

    // Twój Webhook URL
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1487861720050438287/tq33dHJlBuCwj6xqfuam0GwrzgKSbSadKngirWody8Kf2c_YShpYYyXkrcuL_h_T4F3v";

    // Funkcja powiadomień Toast
    function showToast(msg, bad=false){
      const t = document.getElementById("toast");
      const tt = document.getElementById("toastText");
      const icon = document.getElementById("toastIcon");
      
      tt.textContent = msg;
      t.style.display = "flex";
      t.style.background = bad ? "rgba(220,38,38,0.14)" : "rgba(22,163,74,0.14)";
      t.style.borderColor = bad ? "rgba(220,38,38,0.25)" : "rgba(22,163,74,0.25)";
      
      icon.className = bad ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
      icon.style.color = bad ? "var(--bad)" : "var(--good)";
      
      setTimeout(()=> t.style.display="none", 3500);
    }

    // Przeliczanie punktów na żywo
    amountInput.addEventListener('input', () => {
      const amount = parseFloat(amountInput.value) || 0;
      const points = Math.floor(amount / 10);
      calculatedPointsDisplay.textContent = points;
    });

    // Wysyłanie formularza do Discorda
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('userEmail').value;
      const amount = parseFloat(amountInput.value).toFixed(2);
      const points = Math.floor(amount / 10);

      if (points <= 0) {
        showToast("Kwota jest zbyt mała (min. 10 zł)", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Wysyłanie...';

      // Payload dla Discorda dopasowany kolorystycznie
      const payload = {
        username: "MilkShake Bar - Punkty",
        avatar_url: "https://i.imgur.com/Twr2Rms.jpeg", // Logo z Twojego kodu
        embeds: [{
          title: "🎉 Przyznano nowe punkty!",
          color: 16738816, // Kolor pomarańczowy (#FF6A00 dziesiętnie)
          fields: [
            { name: "📧 E-mail", value: email, inline: true },
            { name: "💰 Wydana kwota", value: `${amount} PLN`, inline: true },
            { name: "⭐ Zdobyte punkty", value: `**+${points} pkt**`, inline: false }
          ],
          timestamp: new Date().toISOString()
        }]
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showToast("Punkty dodane! ✅");
          form.reset();
          calculatedPointsDisplay.textContent = '0';
        } else {
          throw new Error('Błąd API Discord');
        }
      } catch (error) {
        showToast("Wystąpił błąd podczas wysyłania.", true);
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-brands fa-discord"></i> Wyślij powiadomienie';
      }
    });
  </script>
</body>
</html>
